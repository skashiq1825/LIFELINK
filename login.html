<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIFELINK LOGIN PAGE</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/locomotive-scroll@3.5.4/dist/locomotive-scroll.css">
    <link rel="stylesheet" href="login.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
</head>

<body>
    <div id="main">
        <div class="logo">
            <div class="limg">
                <i class="ri-service-line"></i>
            </div>
            <h3>LIFE<span>LINK</span></h3>
        </div>
        <div class="box">
           <h5>Secure Portal</h5> 
           <h3>Welcome back.</h3>
           <h4>Sign in to access your health intelligence.</h4>

        <div class="input-box">

            <label> <h4>EMAIL</h4></label>

            <div class="field">

                <i class="fa-regular fa-envelope"></i>

                <input
                    type="email"
                    value="elena@lifelink.health">

            </div>

        </div>

        <div class="input-box">

            <label><h4>PASSWORD</h4></label>

            <div class="field">

                <i class="fa-solid fa-lock"></i>

                <input
                    type="password"
                    placeholder="••••••••" required>

            </div>

        </div>

        <div class="enter">
           <h4>Enter Portal</h4>
            
     </div>

        <p class="bottom">
            Don't have an account?
            <a href="#">Request access</a>
        </p>

        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/locomotive-scroll@3.5.4/dist/locomotive-scroll.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"
        integrity="sha512-NcZdtrT77bJr4STcmsGAESr06BYGE8woZdSdEgqnpyqac7sugNO+Tr4bGwGF3MsnEkGKhU2KL2xh6Ec+BqsaHA=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollTrigger.min.js"
        integrity="sha512-P2IDYZfqSwjcSjX0BKeNhwRUH8zRPGlgcWl5n6gBLzdi4Y5/0O4zaXrtO4K9TZK6Hn1BenYpKowuCavNandERg=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="login.js"></script>
</body>

</html>
